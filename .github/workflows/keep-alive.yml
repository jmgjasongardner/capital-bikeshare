name: Keep Streamlit App Alive

on:
  schedule:
    # Run every 15 minutes to keep the app awake
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          # Ping the app to keep it awake
          # The curl will follow redirects and output the HTTP status code
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "${{ vars.STREAMLIT_APP_URL }}" || echo "000")
          echo "HTTP Status: $HTTP_STATUS"

          # Any response (even errors) means the app is waking up
          if [ "$HTTP_STATUS" = "000" ]; then
            echo "Failed to reach the app - check the URL"
            exit 1
          else
            echo "App pinged successfully!"
          fi
